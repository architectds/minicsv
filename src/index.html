<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="data:,">

  <title>CSV Editor — MathTalking</title>
  <meta name="description" content="Edit CSV files in the browser. 100% offline-capable. All data stays on your device.">

  <!-- Restore theme before paint -->
  <script>
    (function(){
      try {
        var t = localStorage.getItem('mt_theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>

  <style>
    /* ─── Design tokens (extracted from theme-v2.css) ─── */
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

      --brand:         #1d4ed8;
      --accent-green:  #10b981;
      --accent-error:  #dc2626;

      --bg-app:     #f6f7fb;
      --bg-panel:   #ffffff;
      --bg-sunk:    #f1f3f8;
      --bg-soft:    #eef0f6;
      --bg-tint:    #eff6ff;

      --ink-1: #0b1020;
      --ink-2: #3b4258;
      --ink-3: #6b7387;

      --border:        rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.14);
      --divider:       rgba(15, 23, 42, 0.06);

      --shadow-3: 0 8px 24px rgba(9, 14, 30, 0.10);

      --r-1: 6px;
      --r-2: 8px;
      --r-3: 10px;

      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;

      --ease: cubic-bezier(.2,.7,.2,1);
      --dur-1: 120ms;
    }

    html[data-theme="dark"] {
      --bg-app:   #07090f;
      --bg-panel: #0f1320;
      --bg-sunk:  #0a0d17;
      --bg-soft:  #151a2b;
      --bg-tint:  #102a44;

      --ink-1: #f3f5fb;
      --ink-2: #c5cbdc;
      --ink-3: #8a92a8;

      --border:        rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.16);
      --divider:       rgba(255,255,255,0.06);

      --shadow-3: 0 8px 24px rgba(0,0,0,0.55);

      color-scheme: dark;
    }

    /* ─── Reset & layout ─── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg-app);
      color: var(--ink-1);
      font-family: var(--font-sans);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Slim top bar ─── */
    .csv-topbar {
      height: 48px;
      display: flex;
      align-items: center;
      gap: var(--s-3);
      padding: 0 var(--s-4);
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .csv-brand {
      font-weight: 700;
      font-size: 15px;
      color: var(--ink-1);
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .csv-brand:hover { color: var(--brand); }
    .csv-pageTitle { color: var(--ink-3); font-size: 13px; }
    .csv-pageTitle .filename { color: var(--ink-2); margin-left: 4px; font-weight: 500; }
    .csv-spacer { flex: 1; }
    .csv-iconBtn {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      border-radius: var(--r-2);
      color: var(--ink-2);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
    .csv-iconBtn:hover { background: var(--bg-soft); color: var(--ink-1); }
    .csv-language {
      height: 32px;
      max-width: 128px;
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--bg-panel);
      color: var(--ink-2);
      font: inherit;
      font-size: 12px;
      padding: 0 28px 0 10px;
    }
    .csv-language:hover { background: var(--bg-soft); color: var(--ink-1); }

    /* ─── Toolbar ─── */
    .csv-toolbar {
      display: flex;
      align-items: center;
      gap: var(--s-1);
      padding: var(--s-2) var(--s-4);
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex: 0 0 auto;
    }
    .tb-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 4px 10px;
      min-width: 60px;
      border: none;
      background: transparent;
      color: var(--ink-1);
      border-radius: var(--r-2);
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      transition: background var(--dur-1) var(--ease);
    }
    .tb-btn:hover { background: var(--bg-soft); }
    .tb-btn:active { background: var(--bg-sunk); }
    .tb-btn:disabled { opacity: .35; cursor: not-allowed; }
    .tb-btn[hidden] { display: none; }
    .tb-btn .icon { font-size: 18px; line-height: 1; }
    .tb-btn .label { color: var(--ink-3); }
    .tb-divider { width: 1px; height: 28px; background: var(--divider); margin: 0 6px; }

    /* ─── Table ─── */
    .csv-content {
      flex: 1;
      overflow: auto;
      background: var(--bg-panel);
    }
    table.grid {
      border-collapse: separate;
      border-spacing: 0;
      width: max-content;
      min-width: 100%;
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }
    table.grid th, table.grid td {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 0;
      background: var(--bg-panel);
      height: 28px;
      min-width: 110px;
      max-width: 320px;
      position: relative;
    }
    table.grid th.col-head, table.grid th.row-head, table.grid th.corner {
      background: var(--bg-sunk);
      color: var(--ink-3);
      font-weight: 500;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.02em;
      user-select: none;
      cursor: pointer;
      padding: 0 8px;
      position: sticky;
    }
    table.grid th.col-head { top: 0; z-index: 2; min-width: 110px; }
    table.grid th.row-head { left: 0; z-index: 1; min-width: 40px; }
    table.grid th.corner { top: 0; left: 0; z-index: 3; min-width: 40px; }
    table.grid th.col-head.selected, table.grid th.row-head.selected {
      background: var(--brand);
      color: #fff;
    }
    table.grid td.col-selected,
    table.grid tr.row-selected td:not(.row-head) {
      background: var(--bg-tint);
    }
    table.grid td.cell {
      cursor: cell;
      padding: 5px 8px;
      color: var(--ink-1);
      white-space: pre;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    table.grid td.cell.editing { position: relative; }
    table.grid .cell-ghost {
      visibility: hidden;
      white-space: pre;
      pointer-events: none;
    }
    table.grid input.cell-edit {
      position: absolute;
      left: 0; top: 0; right: 0; bottom: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 5px 8px;
      border: none;
      outline: none;
      background: var(--bg-panel);
      box-shadow: inset 0 0 0 2px var(--brand);
      color: var(--ink-1);
      font: inherit;
      box-sizing: border-box;
      border-radius: 2px;
    }
    table.grid tr.csv-spacer td {
      border: none;
      background: transparent;
      padding: 0;
      height: 0;
    }
    table.grid tr.header-row td.cell .cell-input {
      font-weight: 600;
      background: var(--bg-sunk);
    }

    /* ─── Status bar ─── */
    .csv-statusbar {
      display: flex;
      align-items: center;
      gap: var(--s-4);
      padding: var(--s-2) var(--s-4);
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--ink-3);
      flex-wrap: wrap;
      flex: 0 0 auto;
    }
    .csv-statusbar label { display: inline-flex; align-items: center; gap: 6px; user-select: none; }
    .seg {
      display: inline-flex;
      border: 1px solid var(--border-strong);
      border-radius: var(--r-2);
      overflow: hidden;
      background: var(--bg-panel);
    }
    .seg button {
      border: none;
      background: transparent;
      color: var(--ink-1);
      padding: 3px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      border-right: 1px solid var(--divider);
      min-width: 28px;
    }
    .seg button:last-child { border-right: none; }
    .seg button.active { background: var(--brand); color: #fff; }
    .seg button:hover:not(.active) { background: var(--bg-soft); }
    .csv-stats { margin-left: auto; }
    .csv-offline-tag {
      font-size: 11px;
      color: var(--accent-green);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ─── Drop overlay ─── */
    .drop-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-tint);
      border: 3px dashed var(--brand);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: var(--brand);
      font-weight: 600;
      z-index: 100;
      pointer-events: none;
    }
    body.dragging .drop-overlay { display: flex; }

    /* ─── Menu ─── */
    .menu {
      position: absolute;
      background: var(--bg-panel);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-3);
      box-shadow: var(--shadow-3);
      padding: var(--s-1);
      min-width: 160px;
      display: none;
      z-index: 50;
    }
    .menu.open { display: block; }
    .menu button {
      display: block;
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      padding: 6px 12px;
      border-radius: var(--r-1);
      color: var(--ink-1);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
    }
    .menu button:hover { background: var(--bg-soft); }
  </style>

<body>

  <div class="csv-topbar">
    <span class="csv-brand">MathTalking</span>
    <span class="csv-pageTitle"><span data-l10n="pageTitle">CSV Editor</span><span class="filename" id="filename-display"></span></span>
    <span class="csv-spacer"></span>
    <select class="csv-language" id="languageSelect" aria-label="Language">
      <option value="en">English</option>
      <option value="zh">简体中文</option>
      <option value="zh-TW">繁體中文</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="pt-BR">Português</option>
    </select>
    <a class="csv-iconBtn" id="downloadOffline" href="" download="csv-editor.html" title="Download offline copy of this page" aria-label="Download offline copy">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
    </a>
    <button class="csv-iconBtn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v1M12 20v1M3 12h1M20 12h1M5.6 5.6l.7.7M17.7 17.7l.7.7M5.6 18.4l.7-.7M17.7 6.3l.7-.7"/>
        <circle cx="12" cy="12" r="4"/>
      </svg>
    </button>
  </div>

  <div class="csv-toolbar">
    <button class="tb-btn" id="btn-open" title="Open CSV (⌘O)">
      <span class="icon">📂</span><span class="label" data-l10n="open">Open</span>
    </button>
    <button class="tb-btn" id="btn-save" title="Save (⌘S)">
      <span class="icon">💾</span><span class="label" data-l10n="save">Save</span>
    </button>
    <button class="tb-btn" id="btn-saveas" title="Save As (⌘⇧S)">
      <span class="icon">📋</span><span class="label" data-l10n="saveAs">Save As</span>
    </button>
    <button class="tb-btn" id="returnToStat" type="button" hidden title="Return edited data to Stat" aria-label="Return edited data to Stat">
      <span class="icon">↩</span><span class="label" data-l10n="return">Return</span>
    </button>
    <span class="tb-divider"></span>
    <button class="tb-btn" id="btn-add-col">
      <span class="icon" style="color:var(--accent-green)">▥</span><span class="label" data-l10n="addColumn">Add Column</span>
    </button>
    <button class="tb-btn" id="btn-del-col">
      <span class="icon" style="color:var(--accent-error)">▥</span><span class="label" data-l10n="deleteColumn">Delete Column</span>
    </button>
    <button class="tb-btn" id="btn-add-row">
      <span class="icon" style="color:var(--accent-green)">≡</span><span class="label" data-l10n="addRow">Add Row</span>
    </button>
    <button class="tb-btn" id="btn-del-row">
      <span class="icon" style="color:var(--accent-error)">≡</span><span class="label" data-l10n="deleteRow">Delete Row</span>
    </button>
    <span class="csv-spacer"></span>
    <button class="tb-btn" id="btn-export">
      <span class="icon">⇪</span><span class="label" data-l10n="export">Export</span>
    </button>
  </div>

  <div id="content" class="csv-content"></div>

  <div class="csv-statusbar" id="statusbar">
    <label><span data-l10n="separator">Separator</span>
      <div class="seg" id="seg-sep">
        <button data-v="," title="Comma">,</button>
        <button data-v=";" title="Semicolon">;</button>
        <button data-v="\t" title="Tab">→</button>
        <button data-v="|" title="Pipe">|</button>
      </div>
    </label>
    <label><span data-l10n="quote">Quote</span>
      <div class="seg" id="seg-quote">
        <button data-v='"'>&quot;&quot;</button>
        <button data-v="'">' '</button>
        <button data-v="" data-l10n="none">none</button>
      </div>
    </label>
    <label><input type="checkbox" id="chk-header"> <span data-l10n="headerRow">Header row</span></label>
    <span class="csv-offline-tag" title="No network requests after page load" data-l10n="offline">100% offline</span>
    <span class="csv-stats" id="stats"></span>
  </div>

  <div class="drop-overlay" data-l10n="drop">Drop CSV to open</div>

  <div class="menu" id="export-menu">
    <button data-fmt="csv" data-l10n="exportCsv">Export as CSV</button>
    <button data-fmt="tsv" data-l10n="exportTsv">Export as TSV</button>
    <button data-fmt="json" data-l10n="exportJson">Export as JSON</button>
  </div>

  <input type="file" id="file-input" accept=".csv,.tsv,.txt,text/csv" style="display:none" />

  let locale = detectLocale();

  function colLabel(i) {
    let s = '';
    i = i + 1;
    while (i > 0) { i--; s = String.fromCharCode(65 + (i % 26)) + s; i = Math.floor(i / 26); }
    return s;
  }

  function detectLocale() {
    let saved = '';
    try { saved = localStorage.getItem('mt_locale') || ''; } catch (error) {}
    if (SUPPORTED_LOCALES.includes(saved)) return saved;
    const lang = navigator.language || 'en';
    if (SUPPORTED_LOCALES.includes(lang)) return lang;
    if (/^zh/i.test(lang)) return /TW|HK|Hant/i.test(lang) ? 'zh-TW' : 'zh';
    const base = lang.split('-')[0];
    return SUPPORTED_LOCALES.includes(base) ? base : 'en';
  }

  function l10n(key) {
    return L10N[locale]?.[key] || L10N.en[key] || key;
  }

  function shortcut(key) {
    const isMac = /Mac|iPhone|iPad|iPod/i.test(navigator.platform || '');
    const mod = isMac ? '⌘' : 'Ctrl+';
    return `${mod}${key}`;
  }

  function setTitleAndAria(sel, titleKey, ariaKey = titleKey) {
    const el = $(sel);
    if (!el) return;
    el.title = l10n(titleKey);
    el.setAttribute('aria-label', l10n(ariaKey));
  }

  function applyL10n() {
    document.documentElement.lang = locale;
    $('#languageSelect').value = locale;
    $('#languageSelect').setAttribute('aria-label', l10n('language'));
    document.querySelectorAll('[data-l10n]').forEach((el) => {
      el.textContent = l10n(el.dataset.l10n);
    });
    setTitleAndAria('#downloadOffline', 'downloadTitle', 'downloadAria');
    setTitleAndAria('#themeToggle', 'themeTitle', 'themeAria');
    setTitleAndAria('#returnToStat', 'returnTitle', 'returnAria');
    $('#btn-open').title = `${l10n('openTitle')} (${shortcut('O')})`;
    $('#btn-save').title = `${l10n('saveTitle')} (${shortcut('S')})`;
    $('#btn-saveas').title = `${l10n('saveAsTitle')} (${shortcut('Shift+S')})`;
    document.querySelectorAll('#seg-sep button').forEach((btn) => {
      const titles = { ',': 'comma', ';': 'semicolon', '\\t': 'tab', '|': 'pipe' };
      btn.title = l10n(titles[btn.dataset.v] || 'separator');
    });
    updateTitle();
    updateStats();
  }

  function loadFromText(text, name = '', handle = null) {
    const result = Papa.parse(text, {
      delimiter: state.separator,
      quoteChar: state.quote || '"',
      skipEmptyLines: false,
    });
    state.rows = result.data;
    const maxLen = Math.max(1, ...state.rows.map(r => r.length));
    state.rows = state.rows.map(r => {
      const out = r.slice();
      while (out.length < maxLen) out.push('');
      return out;
    });
    if (state.rows.length === 0) state.rows = [['']];
    state.filename = name || state.filename || 'Untitled.csv';
    state.fileHandle = handle;
    state.dirty = false;
    state.selectedCol = state.selectedRow = null;
    state.activeCol = state.activeRow = null;
    state.editing = null;
    content.scrollTop = 0;
    render();
  }

  let importedDataLoaded = false;
  let statReturnChannel = null;
  let statReturnStorageKey = '';

  function setReturnAvailable() {
    $('#returnToStat').hidden = !(statReturnChannel || statReturnStorageKey);
  }

  function cleanImportUrl() {
    if (!window.history?.replaceState || !window.location.search) return;
    const clean = window.location.pathname || 'csv-editor.html';
    window.history.replaceState(null, '', clean);
  }

  function loadImportedData(payload) {
    if (importedDataLoaded || !payload) return false;
    const text = typeof payload.text === 'string' ? payload.text : '';
    const name = typeof payload.name === 'string' && payload.name.trim() ? payload.name.trim() : 'stat-data.csv';
    importedDataLoaded = true;
    loadFromText(text, name, null);
    cleanImportUrl();
    return true;
  }

  function readStoredImport(importKey) {
    if (!importKey) return null;
    try {
      const raw = localStorage.getItem(importKey);
      localStorage.removeItem(importKey);
      if (!raw) return null;
      const payload = JSON.parse(raw);
      if (!payload || payload.source !== 'stat') return null;
      if (Date.now() - Number(payload.created || 0) > 5 * 60 * 1000) return null;
      return payload;
    } catch (error) {
      return null;
    }
  }

  function installImportBridge() {
    const params = new URLSearchParams(window.location.search);
    statReturnStorageKey = params.get('returnKey') || '';

    const channelName = params.get('channel');
    if (channelName && typeof window.BroadcastChannel === 'function') {
      statReturnChannel = new BroadcastChannel(channelName);
      statReturnChannel.onmessage = (event) => {
        const message = event.data || {};
        if (message.type === 'mt-csv-editor-import') {
          if (loadImportedData(message.payload)) {
            statReturnChannel.postMessage({ type: 'mt-csv-editor-loaded' });
          }
        } else if (message.type === 'mt-csv-editor-returned') {
          statReturnChannel.close();
          statReturnChannel = null;
          setReturnAvailable();
          setTimeout(() => window.close(), 80);
        }
      };
      statReturnChannel.postMessage({ type: 'mt-csv-editor-ready' });
    }

    const storedPayload = readStoredImport(params.get('importKey'));
    if (storedPayload) loadImportedData(storedPayload);
    setReturnAvailable();
  }

  async function openFile() {
    if (window.MTCsvDesktop?.openFile) return window.MTCsvDesktop.openFile();
    if ('showOpenFilePicker' in window) {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{ description: 'CSV files', accept: { 'text/csv': ['.csv', '.tsv', '.txt'] } }],
        });
        const file = await handle.getFile();
        const text = await file.text();
        loadFromText(text, file.name, handle);
      } catch (e) {}
    } else {
      $('#file-input').click();
    }
  }

  $('#file-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    loadFromText(text, file.name, null);
    e.target.value = '';
  });

  let dragDepth = 0;
  window.addEventListener('dragenter', (e) => {
    if (e.dataTransfer && Array.from(e.dataTransfer.types).includes('Files')) {
      dragDepth++; document.body.classList.add('dragging');
    }
  });
  window.addEventListener('dragleave', () => {
    dragDepth = Math.max(0, dragDepth - 1);
    if (dragDepth === 0) document.body.classList.remove('dragging');
  });
  window.addEventListener('dragover', (e) => e.preventDefault());
  window.addEventListener('drop', async (e) => {
    e.preventDefault();
    dragDepth = 0; document.body.classList.remove('dragging');
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const text = await file.text();
    loadFromText(text, file.name, null);
  });

  function buildCsv(format = 'csv') {
    const sep = format === 'tsv' ? '\t' : state.separator;
    if (format === 'json') {
      const rows = state.rows;
      if (state.header && rows.length > 0) {
        const headers = rows[0];
        const out = rows.slice(1).map(r => {
          const o = {};
          headers.forEach((h, i) => { o[h] = r[i] ?? ''; });
          return o;
        });
        return JSON.stringify(out, null, 2);
      }
      return JSON.stringify(rows, null, 2);
    }
    return Papa.unparse(state.rows, {
      delimiter: sep,
      quoteChar: state.quote || '"',
      quotes: !!state.quote,
      newline: '\n',
    });
  }

  async function save() {
    if (window.MTCsvDesktop?.save) return window.MTCsvDesktop.save();
    const text = buildCsv('csv');
    if (state.fileHandle && 'createWritable' in state.fileHandle) {
      try {
        const w = await state.fileHandle.createWritable();
        await w.write(text); await w.close();
        state.dirty = false; updateTitle();
        return;
      } catch (e) {}
    }
    return saveAs();
  }

  async function saveAs() {
    if (window.MTCsvDesktop?.saveAs) return window.MTCsvDesktop.saveAs();
    const text = buildCsv('csv');
    if ('showSaveFilePicker' in window) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: state.filename || 'untitled.csv',
          types: [{ description: 'CSV', accept: { 'text/csv': ['.csv'] } }],
        });
        const w = await handle.createWritable();
        await w.write(text); await w.close();
        state.fileHandle = handle;
        state.filename = handle.name;
        state.dirty = false; updateTitle();
        return;
      } catch (e) { return; }
    }
    const suggested = state.filename || 'untitled.csv';
    const name = window.prompt(l10n('savePrompt'), suggested);
    if (!name) return;
    downloadBlob(text, name.endsWith('.csv') ? name : name + '.csv', 'text/csv');
    state.filename = name;
    state.dirty = false;
    updateTitle();
  }

  function downloadBlob(text, name, mime) {
    const blob = new Blob([text], { type: mime + ';charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  function exportAs(fmt) {
    const text = buildCsv(fmt);
    const base = (state.filename || 'untitled').replace(/\.[^.]+$/, '');
    const ext = fmt === 'json' ? 'json' : (fmt === 'tsv' ? 'tsv' : 'csv');
    const mime = fmt === 'json' ? 'application/json' : 'text/' + ext;
    downloadBlob(text, base + '.' + ext, mime);
  }

  function returnToStat() {
    const payload = {
      text: buildCsv('csv'),
      name: state.filename || 'stat-data.csv',
      source: 'csv-editor',
      created: Date.now(),
    };
    let sent = false;
    if (statReturnChannel) {
      try {
        statReturnChannel.postMessage({ type: 'mt-csv-editor-return', payload });
        sent = true;
      } catch (error) {}
    }
    if (statReturnStorageKey) {
      try {
        localStorage.setItem(statReturnStorageKey, JSON.stringify(payload));
        sent = true;
      } catch (error) {}
    }
    if (!sent) {
      window.alert(l10n('returnUnavailable'));
      return;
    }
    state.dirty = false;
    updateTitle();
    $('#stats').textContent = l10n('returned');
    setTimeout(() => window.close(), statReturnChannel ? 600 : 120);
  }

  function clearRenderedSelection() {
    state.selectedCol = null;
    state.selectedRow = null;
    content.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
    content.querySelectorAll('.col-selected').forEach(el => el.classList.remove('col-selected'));
    content.querySelectorAll('.row-selected').forEach(el => el.classList.remove('row-selected'));
  }

  function rememberActiveCell(cell, clearSelection = false) {
    const td = cell?.closest('td.cell');
    if (!td) return false;
    state.activeRow = +td.dataset.row;
    state.activeCol = +td.dataset.col;
    if (clearSelection && (state.selectedCol != null || state.selectedRow != null)) {
      clearRenderedSelection();
    }
    return true;
  }

  function currentColIndex() {
    const cols = state.rows[0]?.length ?? 0;
    const idx = state.activeCol ?? state.selectedCol;
    return idx == null ? null : Math.max(0, Math.min(idx, Math.max(0, cols - 1)));
  }

  function currentRowIndex() {
    const idx = state.activeRow ?? state.selectedRow;
    return idx == null ? null : Math.max(0, Math.min(idx, Math.max(0, state.rows.length - 1)));
  }

  function insertColAfterCurrent() {
    const idx = currentColIndex();
    return idx == null ? null : idx + 1;
  }

  function insertRowAfterCurrent() {
    const idx = currentRowIndex();
    return idx == null ? null : idx + 1;
  }

  function addCol(at) {
    if (state.editing) commitEdit(false);
    if (at == null) at = state.rows[0]?.length ?? 0;
    state.rows.forEach(r => r.splice(at, 0, ''));
    state.dirty = true;
    state.selectedCol = at;
    state.selectedRow = null;
    state.activeCol = at;
    render();
  }
  function delCol(at) {
    if (state.editing) commitEdit(false);
    if (at == null) at = currentColIndex();
    if (at == null) at = (state.rows[0]?.length ?? 1) - 1;
    if (state.rows[0] && state.rows[0].length <= 1) {
      state.rows.forEach(r => r[0] = '');
    } else {
      state.rows.forEach(r => r.splice(at, 1));
    }
    state.dirty = true;
    state.selectedCol = null;
    state.activeCol = null;
    render();
  }
  function addRow(at) {
    if (state.editing) commitEdit(false);
    if (at == null) at = state.rows.length;
    const w = state.rows[0]?.length || 1;
    state.rows.splice(at, 0, Array(w).fill(''));
    state.dirty = true;
    state.selectedRow = at;
    state.selectedCol = null;
    state.activeRow = at;
    render();
  }
  function delRow(at) {
    if (state.editing) commitEdit(false);
    if (at == null) at = currentRowIndex();
    if (at == null) at = state.rows.length - 1;
    if (state.rows.length <= 1) {
      state.rows = [Array(state.rows[0]?.length || 1).fill('')];
    } else {
      state.rows.splice(at, 1);
    }
    state.dirty = true;
    state.selectedRow = null;
    state.activeRow = null;
    render();
  }

  function rebuildDataIndices() {
    _dataIdxs = [];
    const headerRowIdx = state.header ? 0 : -1;
    for (let r = 0; r < state.rows.length; r++) {
      if (r !== headerRowIdx) _dataIdxs.push(r);
    }
  }

  function escapeAttr(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function buildHeaderHtml() {
    const cols = state.rows[0]?.length || 0;
    let html = '<thead><tr><th class="corner"></th>';
    for (let c = 0; c < cols; c++) {
      const sel = state.selectedCol === c ? ' selected' : '';
      const label = state.header ? escapeHtml(state.rows[0][c] || colLabel(c)) : colLabel(c);
      html += `<th class="col-head${sel}" data-col="${c}">${label}</th>`;
    }
    html += '</tr></thead>';
    return html;
  }

  function buildRowHtml(r, displayIdx) {
    const cols = state.rows[0]?.length || 0;
    const selRow = state.selectedRow === r ? ' row-selected' : '';
    let html = `<tr class="${selRow}" data-row="${r}">`;
    html += `<th class="row-head${state.selectedRow === r ? ' selected' : ''}" data-row="${r}">${displayIdx + 1}</th>`;
    for (let c = 0; c < cols; c++) {
      const colSel = state.selectedCol === c ? ' col-selected' : '';
      const isEditing = state.editing && state.editing.r === r && state.editing.c === c;
      if (isEditing) {
        const v = state.rows[r][c] ?? '';
        html += `<td class="cell editing${colSel}" data-row="${r}" data-col="${c}"><span class="cell-ghost">${escapeHtml(v) || '&nbsp;'}</span><input class="cell-edit" value="${escapeAttr(v)}" spellcheck="false"></td>`;
      } else {
        html += `<td class="cell${colSel}" data-row="${r}" data-col="${c}">${escapeHtml(state.rows[r][c] ?? '')}</td>`;
      }
    }
    html += '</tr>';
    return html;
  }

  function render() {
    rebuildDataIndices();
    const cols = state.rows[0]?.length || 0;
    const colspanAll = cols + 1;

    let html = '<table class="grid">';
    html += buildHeaderHtml();
    html += '<tbody>';
    html += `<tr class="csv-spacer" id="csv-spacer-top"><td colspan="${colspanAll}"></td></tr>`;
    html += `<tr class="csv-spacer" id="csv-spacer-bottom"><td colspan="${colspanAll}"></td></tr>`;
    html += '</tbody></table>';

    const old = content.querySelector('table');
    if (old) old.remove();
    content.insertAdjacentHTML('beforeend', html);

    _firstRendered = -1;
    _lastRendered = -1;
    renderVisibleRows();

    updateTitle();
    updateStats();
    setActive('#seg-sep', state.separator);
    setActive('#seg-quote', state.quote);
    $('#chk-header').checked = state.header;
  }

  function renderVisibleRows() {
    const total = _dataIdxs.length;
    const top = $('#csv-spacer-top');
    const bot = $('#csv-spacer-bottom');
    if (!top || !bot) return;

    const containerH = content.clientHeight || 600;
    const scrollTop = content.scrollTop;
    const first = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - BUFFER);
    const last = Math.min(total, Math.ceil((scrollTop + containerH) / ROW_HEIGHT) + BUFFER);

    // If editing cell scrolled out, commit before unmounting
    if (state.editing) {
      const editIdx = _dataIdxs.indexOf(state.editing.r);
      if (editIdx >= 0 && (editIdx < first || editIdx >= last)) {
        commitEdit(false);
      }
    }

    if (first === _firstRendered && last === _lastRendered) return;
    _firstRendered = first;
    _lastRendered = last;

    top.querySelector('td').style.height = (first * ROW_HEIGHT) + 'px';
    bot.querySelector('td').style.height = ((total - last) * ROW_HEIGHT) + 'px';

    // Drop existing data rows between spacers
    let cur = top.nextElementSibling;
    while (cur && cur !== bot) {
      const next = cur.nextElementSibling;
      cur.remove();
      cur = next;
    }

    let html = '';
    for (let i = first; i < last; i++) {
      html += buildRowHtml(_dataIdxs[i], i);
    }
    if (html) bot.insertAdjacentHTML('beforebegin', html);

    if (state.editing) {
      const inp = content.querySelector('input.cell-edit');
      if (inp && document.activeElement !== inp) inp.focus();
    }
  }

  function ensureRowVisible(r) {
    const idx = _dataIdxs.indexOf(r);
    if (idx < 0) return;
    const containerH = content.clientHeight;
    const top = idx * ROW_HEIGHT;
    const bot = top + ROW_HEIGHT;
    const sTop = content.scrollTop;
    if (top < sTop) content.scrollTop = top;
    else if (bot > sTop + containerH) content.scrollTop = bot - containerH;
  }

  function startEdit(r, c) {
    if (state.editing && state.editing.r === r && state.editing.c === c) return;
    if (state.editing) commitEdit(false);
    state.editing = { r, c };
    state.activeRow = r;
    state.activeCol = c;

    let td = content.querySelector(`td.cell[data-row="${r}"][data-col="${c}"]`);
    if (!td) {
      ensureRowVisible(r);
      _firstRendered = -1; _lastRendered = -1;
      renderVisibleRows();
      td = content.querySelector(`td.cell[data-row="${r}"][data-col="${c}"]`);
      if (!td) return;
    }
    td.classList.add('editing');
    const v = state.rows[r][c] ?? '';
    td.innerHTML = `<span class="cell-ghost">${escapeHtml(v) || '&nbsp;'}</span><input class="cell-edit" value="${escapeAttr(v)}" spellcheck="false">`;
    const inp = td.querySelector('input');
    inp.focus();
    inp.select();
  }

  function commitEdit(restoreCellDom = true) {
    if (!state.editing) return;
    const { r, c } = state.editing;
    // Defensive: state.rows may have mutated since edit started
    if (r >= state.rows.length || c >= (state.rows[r]?.length ?? 0)) {
      state.editing = null;
      return;
    }
    const td = content.querySelector(`td.cell[data-row="${r}"][data-col="${c}"]`);
    const inp = td?.querySelector('input.cell-edit');
    if (inp) {
      const v = inp.value;
      if (v !== (state.rows[r][c] ?? '')) {
        state.rows[r][c] = v;
        state.dirty = true;
        updateTitle();
      }
    }
    state.editing = null;
    if (td && restoreCellDom) {
      td.classList.remove('editing');
      td.innerHTML = escapeHtml(state.rows[r][c] ?? '');
    }
  }

  function moveEdit(dr, dc) {
    if (!state.editing) return false;
    const { r, c } = state.editing;
    const cols = state.rows[0]?.length || 0;
    let nr = r + dr, nc = c + dc;
    if (nc < 0) { nc = cols - 1; nr--; }
    else if (nc >= cols) { nc = 0; nr++; }
    if (state.header && nr === 0) {
      if (dr >= 0) nr = 1;
      else { commitEdit(); return true; }
    }
    if (nr < 0 || nr >= state.rows.length) {
      commitEdit();
      return true;
    }
    commitEdit(false);
    ensureRowVisible(nr);
    _firstRendered = -1; _lastRendered = -1;
    renderVisibleRows();
    startEdit(nr, nc);
    return true;
  }

  function setActive(segSel, value) {
    document.querySelectorAll(segSel + ' button').forEach(b => {
      const v = b.dataset.v === '\\t' ? '\t' : b.dataset.v;
      b.classList.toggle('active', v === value);
    });
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function updateTitle() {
    const dot = state.dirty ? ' • ' : '';
    filenameDisplay.textContent = state.filename ? ' — ' + state.filename + dot : '';
    titleEl.textContent = (state.dirty ? '• ' : '') + (state.filename || l10n('pageTitle')) + ' · MathTalking';
  }

  function updateStats() {
    const cols = state.rows[0]?.length || 0;
    const rows = state.rows.length - (state.header ? 1 : 0);
    $('#stats').textContent = `${rows} ${rows === 1 ? l10n('row') : l10n('rows')} × ${cols} ${cols === 1 ? l10n('column') : l10n('columns')}`;
  }

  content.addEventListener('click', (e) => {
    if (e.target.matches('input.cell-edit')) return;
    const colHead = e.target.closest('.col-head');
    const rowHead = e.target.closest('.row-head');
    if (colHead) {
      const c = +colHead.dataset.col;
      if (state.editing) commitEdit(false);
      state.selectedCol = state.selectedCol === c ? null : c;
      state.selectedRow = null;
      state.activeCol = state.selectedCol;
      state.activeRow = null;
      render(); return;
    }
    if (rowHead) {
      const r = +rowHead.dataset.row;
      if (state.editing) commitEdit(false);
      state.selectedRow = state.selectedRow === r ? null : r;
      state.selectedCol = null;
      state.activeRow = state.selectedRow;
      state.activeCol = null;
      render(); return;
    }
    const cell = e.target.closest('td.cell');
    if (cell && !cell.classList.contains('editing')) {
      const r = +cell.dataset.row;
      const c = +cell.dataset.col;
      if (state.selectedCol != null || state.selectedRow != null) clearRenderedSelection();
      startEdit(r, c);
    }
  });

  content.addEventListener('focusin', (e) => {
    if (e.target.matches('input.cell-edit')) {
      const td = e.target.closest('td.cell');
      if (td) { state.activeRow = +td.dataset.row; state.activeCol = +td.dataset.col; }
    }
  });

  content.addEventListener('focusout', (e) => {
    if (!e.target.matches('input.cell-edit')) return;
    const next = e.relatedTarget;
    if (next && next.matches && next.matches('input.cell-edit')) return; // moveEdit handles commit
    commitEdit();
  });

  content.addEventListener('keydown', (e) => {
    if (!e.target.matches('input.cell-edit')) return;
    if (e.key === 'Escape') {
      e.preventDefault();
      if (state.editing) {
        const { r, c } = state.editing;
        state.editing = null; // discard pending input value
        const td = content.querySelector(`td.cell[data-row="${r}"][data-col="${c}"]`);
        if (td) {
          td.classList.remove('editing');
          td.innerHTML = escapeHtml(state.rows[r][c] ?? '');
        }
      }
      return;
    }
    if (e.key === 'Tab') { e.preventDefault(); moveEdit(0, e.shiftKey ? -1 : 1); return; }
    if (e.key === 'Enter') { e.preventDefault(); moveEdit(e.shiftKey ? -1 : 1, 0); return; }
    if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      if (!state.editing) return;
      const total = _dataIdxs.length;
      if (total === 0) return;
      const targetIdx = e.key === 'ArrowUp' ? 0 : total - 1;
      const targetR = _dataIdxs[targetIdx];
      const c = state.editing.c;
      commitEdit(false);
      ensureRowVisible(targetR);
      _firstRendered = -1; _lastRendered = -1;
      renderVisibleRows();
      startEdit(targetR, c);
    }
  });

  // Virtualization: re-render visible rows on scroll (rAF-throttled)
  content.addEventListener('scroll', () => {
    if (_scrollPending) return;
    _scrollPending = true;
    requestAnimationFrame(() => {
      _scrollPending = false;
      renderVisibleRows();
    });
  });

  $('#btn-open').addEventListener('click', openFile);
  $('#btn-save').addEventListener('click', save);
  $('#btn-saveas').addEventListener('click', saveAs);
  $('#btn-add-col').addEventListener('click', () => addCol(insertColAfterCurrent()));
  $('#btn-del-col').addEventListener('click', () => delCol());
  $('#btn-add-row').addEventListener('click', () => addRow(insertRowAfterCurrent()));
  $('#btn-del-row').addEventListener('click', () => delRow());
  $('#returnToStat').addEventListener('click', returnToStat);
  $('#languageSelect').addEventListener('change', (e) => {
    locale = e.target.value;
    try { localStorage.setItem('mt_locale', locale); } catch (error) {}
    applyL10n();
  });

  const exportMenu = $('#export-menu');
  $('#btn-export').addEventListener('click', (e) => {
    e.stopPropagation();
    const rect = e.currentTarget.getBoundingClientRect();
    exportMenu.style.top = (rect.bottom + 4) + 'px';
    exportMenu.style.left = Math.max(8, rect.right - 160) + 'px';
    exportMenu.classList.toggle('open');
  });
  exportMenu.addEventListener('click', (e) => {
    const fmt = e.target.dataset.fmt;
    if (fmt) { exportAs(fmt); exportMenu.classList.remove('open'); }
  });
  document.addEventListener('click', () => exportMenu.classList.remove('open'));

  $('#seg-sep').addEventListener('click', (e) => {
    if (e.target.tagName !== 'BUTTON') return;
    const v = e.target.dataset.v === '\\t' ? '\t' : e.target.dataset.v;
    state.separator = v;
    setActive('#seg-sep', v);
  });
  $('#seg-quote').addEventListener('click', (e) => {
    if (e.target.tagName !== 'BUTTON') return;
    state.quote = e.target.dataset.v;
    setActive('#seg-quote', state.quote);
  });
  $('#chk-header').addEventListener('change', (e) => {
    state.header = e.target.checked;
    render();
  });

  $('#themeToggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('mt_theme', next); } catch (e) {}
  });

  // Download a clean copy of the app shell, never the edited table DOM.
  const dl = $('#downloadOffline');
  dl.addEventListener('click', (e) => {
    if (location.protocol === 'file:') {
      e.preventDefault();
      const blob = new Blob([offlineHtml], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'csv-editor.html';
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } else {
      // Online: anchor's href = self, download attr triggers save
      dl.href = location.pathname;
    }
  });

  window.addEventListener('keydown', (e) => {
    const mod = e.metaKey || e.ctrlKey;
    if (!mod) return;
    if (e.key === 's' || e.key === 'S') {
      e.preventDefault();
      if (e.shiftKey) saveAs(); else save();
    } else if (e.key === 'o') { e.preventDefault(); openFile(); }
  });

  window.addEventListener('beforeunload', (e) => {
    if (statReturnChannel) {
      try { statReturnChannel.close(); } catch (error) {}
    }
    if (state.dirty) { e.preventDefault(); e.returnValue = ''; }
  });


  window.MTCsvEditor = {
    loadText(text, name) {
      loadFromText(text || '', name || 'Untitled.csv', null);
      state.dirty = false;
      updateTitle();
    },
    getText() {
      return buildCsv('csv');
    },
    getFilename() {
      return state.filename || 'untitled.csv';
    },
    markSaved(name) {
      if (name) state.filename = name;
      state.dirty = false;
      updateTitle();
    },
    setStatus(message) {
      if (message) $('#stats').textContent = message;
    },
    isDirty() {
      return !!state.dirty;
    }
  };

  installImportBridge();

  // Boot: empty Excel-like grid
  if (!importedDataLoaded) {
    state.rows = Array.from({ length: 25 }, () => Array(8).fill(''));
    state.filename = 'Untitled.csv';
    state.dirty = false;
    render();
  }
  applyL10n();
})();
</script>
  <script defer src="./desktop-bridge.js"></script>
</body>
</html>
