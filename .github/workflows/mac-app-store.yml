name: Mac App Store Upload

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install npm dependencies
        run: npm ci

      - name: Check standalone editor
        run: npm run check:editor

      - name: Generate App Store entitlements
        run: |
          cat > src-tauri/Entitlements.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-write</key>
            <true/>
            <key>com.apple.application-identifier</key>
            <string>${APPLE_TEAM_ID}.com.mathtalking.csveditor</string>
            <key>com.apple.developer.team-identifier</key>
            <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          EOF
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Decode provisioning profile
        run: |
          echo "$MACOS_PROVISION_PROFILE_BASE64" | base64 --decode > src-tauri/embedded.provisionprofile
        env:
          MACOS_PROVISION_PROFILE_BASE64: ${{ secrets.MACOS_PROVISION_PROFILE_BASE64 }}

      - name: Import signing certificates
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "$APPLE_APP_CERTIFICATE_BASE64" | base64 --decode > app_certificate.p12
          echo "$APPLE_INSTALLER_CERTIFICATE_BASE64" | base64 --decode > installer_certificate.p12
          security import app_certificate.p12 -k build.keychain -P "$APPLE_APP_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security import installer_certificate.p12 -k build.keychain -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
        env:
          APPLE_APP_CERTIFICATE_BASE64: ${{ secrets.APPLE_APP_CERTIFICATE_BASE64 }}
          APPLE_APP_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_APP_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Build signed universal app
        run: npm run build:mas
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_APP_SIGNING_IDENTITY }}

      - name: Build signed PKG
        run: |
          xcrun productbuild \
            --sign "$APPLE_INSTALLER_SIGNING_IDENTITY" \
            --component "src-tauri/target/universal-apple-darwin/release/bundle/macos/MathTalking CSV Editor.app" \
            /Applications \
            "MathTalking CSV Editor.pkg"
        env:
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}

      - name: Prepare App Store Connect key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf "%s" "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type macos \
            --file "MathTalking CSV Editor.pkg" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
